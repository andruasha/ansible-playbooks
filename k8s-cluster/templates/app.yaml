---
apiVersion: v1
kind: Service
metadata:
  name: syngx
  labels:
    app.kubernetes.io/instance: syngx
    app.kubernetes.io/name: syngx
spec:
  ports:
    - name: tcp-8080
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/instance: syngx
    app.kubernetes.io/name: syngx
---
apiVersion: v1
kind: Service
metadata:
  name: ingressgateway-app
  labels:
    app: ingressgateway-app
    istio: ingressgateway-app
spec:
  ports:
    - name: rest-8443
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    app: ingressgateway-app
    istio: ingressgateway-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/default-backend: ingressgateway-app
    nginx.ingress.kubernetes.io/secure-backends: 'true'
    nginx.ingress.kubernetes.io/ssl-passthrough: 'true'
  name: app-http-naebank
  labels:
    app: http-ingress
spec:
  rules:
  - host: app.naebank.k8s.ru
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: ingressgateway-app
              port:
                number: 8443