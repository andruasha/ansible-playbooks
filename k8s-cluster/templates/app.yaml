apiVersion: v1
kind: ConfigMap
metadata:
  name: syngx-cm-custom
data:
  nginx.conf: |
    user www-data;
    worker_processes auto;
    pid /run/nginx.pid;
    error_log /var/log/nginx/error.log;
    include /etc/nginx/modules-enabled/*.conf;
    
    events {
        worker_connections 1024;
    }
    
    http {
        server {
            listen 8080;
            server_name nginx.k8s.ru;
    
            location /actuator/health {
                return 200;
            }
  
            location /actuator/health/liveness {
                return 200;
            }
  
            location /integration/api/user {
                return 200 '100';
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: syngx
  name: syngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: syngx
      app.kubernetes.io/name: syngx
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 50%
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: syngx
        app.kubernetes.io/name: syngx
      annotations:
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/proxyCPU: "50m"
        sidecar.istio.io/proxyMemory: "100Mi"
        sidecar.istio.io/proxyCPULimit: "50m"
        sidecar.istio.io/proxyMemoryLimit: "100Mi"
    spec:
      serviceAccount: "default"
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
        privileged: false
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegedEscalation: false
      volumes:
        name: syngx-cm-custom-vol
        configMap:
          name: syngx-cm-custom
          defaultMode: 256
          items:
            - key: nginx.conf
              path: nginx.conf
      containers:
        - name: syngx
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegedEscalation: false
          imagePullPolicy: IfNotPresent
          image: docker.io/library/nginx:1.29.6
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
              scheme: HTTP
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 180
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 4
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            failureThreshold: 60
            periodSeconds: 5
          resources:
            limits:
              cpu: 50m
              memory: 100Mi
            requests:
              cpu: 50m
              memory: 100Mi
          volumeMounts:
            - name: syngx-cm-custom-vol
              readOnly: true
              mountPath: /etc/nginx
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - syngx
                topologyKey: kubernetes.io/hostname
---
