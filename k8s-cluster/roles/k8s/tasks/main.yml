---
- name: Disable swap in current session
  shell: sudo swapoff -a

- name: Disable swap permanently
  shell: sudo sed -i.bak '/\/swapfile/s/^/#/' /etc/fstab

- name: Create modules-load.d directory if not exists
  file:
    path: /etc/modules-load.d
    state: directory
    mode: '0755'

- name: Add br_netfilter to modules load
  lineinfile:
    path: /etc/modules-load.d/k8s.conf
    line: 'br_netfilter'
    create: yes
    state: present

- name: Load br_netfilter module immediately
  shell: sudo modprobe br_netfilter

- name: Configure kernel parameters
  sysctl:
    name: "{{ item }}"
    value: '1'
    state: present
    reload: yes
    sysctl_set: yes
  loop:
    - net.bridge.bridge-nf-call-iptables
    - net.bridge.bridge-nf-call-ip6tables
    - net.ipv4.ip_forward

- name: Apply sysctl configuration
  shell: sudo sysctl -p


- name: Add Docker gpg key
  shell: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -

- name: Make directory for k8s gpg keys
  shell: sudo mkdir -p -m 755 /etc/apt/keyrings

- name: Add k8s gpg keys
  shell: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key | sudo gpg --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Helm gpg key
  shell: curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey | gpg --yes --dearmor | sudo tee /usr/share/keyrings/helm.gpg


- name: Add Docker apt repository
  shell: 'sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"'

- name: Add k8s repository
  shell: 'echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /" | sudo tee /etc/apt/sources.list.d/kubernetes.list'

- name: Add Helm repository
  shell: 'echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list'


- name: Update packages repository
  shell: sudo apt update

- name: Install necessary packages
  shell: sudo apt install -y apt-transport-https ca-certificates curl gnupg-agent software-properties-common

- name: Install Docker components
  shell: sudo apt install -y docker-ce docker-ce-cli containerd.io

- name: Delete containerd config file
  shell: sudo rm /etc/containerd/config.toml

- name: Restart containerd.service
  shell: sudo systemctl restart containerd.service

- name: Install k8s components
  shell: sudo apt install -y kubelet kubeadm kubectl

- name: Install Helm
  shell: sudo apt install helm

- name: Generate Docker config from template
  template:
    src: "{{ playbook_dir }}/../templates/docker_config_template.j2"
    dest: /etc/docker/daemon.json

- name: Generate Kubeadm config from template
  template:
    src: "{{ playbook_dir }}/../templates/kubeadm_config_template.j2"
    dest: /lib/systemd/system/kubelet.service.d/10-kubeadm.conf

- name: Generate Kubelet config from template
  template:
    src: "{{ playbook_dir }}/../templates/kubelet_config_template.j2"
    dest: /var/lib/kubelet/config.yaml

- name: Reload daemons
  shell: sudo systemctl daemon-reload

- name: Initialize k8s cluster
  shell: sudo kubeadm init --apiserver-advertise-address={{ ansible_host }} --pod-network-cidr=10.10.0.0/16
  when: "'master' in group_names"

- name: Get join command
  shell: sudo kubeadm token create --print-join-command
  register: join_command
  when: "'master' in group_names"

- name: Join nodes to k8s cluster
  shell: "{{ hostvars[item]['join_command'].stdout }}"
  with_items: "{{ groups['master'] }}"
  when: "'workers' in group_names"

- name: Create .kube directory
  shell: mkdir /home/{{ ansible_user }}/.kube
  when: "'master' in group_names"

- name: Copy kubectl config
  shell: sudo cp /etc/kubernetes/admin.conf /home/{{ ansible_user }}/.kube/config
  when: "'master' in group_names"

- name: Change kubectl config owner
  shell: sudo chown {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube/config
  when: "'master' in group_names"